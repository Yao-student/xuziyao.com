{% extends 'pages/base.html' %}

{% block title %}随机数生成{% endblock %}

{% block header %}随机数生成{% endblock %}

{% block content %}

<nav>
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{% url 'pages:index' %}">首页</a></li>
    <li class="breadcrumb-item active">随机数生成</li>
  </ol>
</nav>

<hr />

<form id="form" class="form">
  {% csrf_token %}
  <p>
    <label for="min" class="form-label">最小值:</label>
    <input type="number" name="min" class="form-control" id="min" value="0" step="any" required>
  </p>
  <p>
    <label for="max" class="form-label">最大值:</label>
    <input type="number" name="max" class="form-control" id="max" value="10" step="any" required>
  </p>
  <p>
    <label for="decimal_places" class="form-label">小数位数:</label>
    <input type="number" name="decimal-places" class="form-control" id="decimal-places" value="1" min="0" required>
  </p>
  <button type="submit" class="btn btn-primary">生成</button>
</form>

{% endblock %}

{% block script %}

<script>

    const form = document.forms['form'];

    form.onsubmit = e => {
        e.preventDefault();

        const min = +form['min'].value;
        const max = +form['max'].value;
        const decimalPlaces = +form['decimal-places'].value;

        if (min >= max) {
            alert('最小值必须小于最大值');
            return;
        }

        const randomNum = Math.random() * (max - min) + min;
        const roundedNum = Number(randomNum.toFixed(decimalPlaces));

        document.getElementById('result')?.remove();
        const result = document.createElement('p');
        result.id = 'result';
        result.textContent = `结果: ${roundedNum}`;
        form.after(result);
    }

</script>

{% endblock %}

{% block page_pv %}<span id="vercount_value_page_pv"></span>{% endblock %}
