<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <title>Wiki - Notanote</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="//static.notanote.cn/images/GameIcon.png" />
    <link rel="stylesheet" href="//static.notanote.cn/css/atom-ui/atom-ui-markdown-explore.css" />
    <link rel="stylesheet" href="//static.notanote.cn/css/litepress.css" />
    <script src="//static.notanote.cn/js/marked.js"></script>
</head>

<style>
    .Header {
        height: 70px;
    }

    .Layout {
        padding-top: 40px !important;
    }

    .Sidebar {
        top: 70px;
    }

    .SidebarBackdrop {
        top: 70px;
    }

    .vidimgicon {
        border-radius: 0px !important;
        display: inline-block !important;
        margin: 0 !important;
        box-shadow: none !important;
    }
</style>

<body>
    <header class="Header">
        <a href="/">
            <img class="TitlePNG" src="//static.notanote.cn/images/Notanote.png" alt="Notanote" />
        </a>
        <button type="button" class="SidebarMenuButton" aria-label="打开目录" aria-controls="sidebar-container"
            aria-expanded="false"><span class="SidebarMenuIcon" aria-hidden="true"><span></span></span></button>
        <p class="BigTitle">Wiki</p>
        <div class="Right-Links" id="HeaderLinks"></div>
    </header>

    <div class="Layout">
        <aside class="Sidebar" id="sidebar-container"></aside>

        <div class="Content-Wrapper">
            <section class="ContentIntro markdown-body Atom-Markdown" id="main-content">
                <div id="markdown-container"></div>
                <p style="text-align: right;">梦游制作组 团队</p>
            </section>

            <section class="Footer">
                <img class="Logo" src="//static.notanote.cn/images/Notanote.png" alt="Logo" /><br />
                <p style="font-size: 120%; margin: 0;">在故事中感受音乐的律动，在游戏中见证她们的故事！</p>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 24px;">
                    <div class="Left">
                        <div>B站官号：<a href="//space.bilibili.com/701972652">点击访问</a></div>
                        <div>联系我们：<a href="mailto:contact@notanote.cn">contact@notanote.cn</a></div>
                    </div>
                    <div class="Right">
                        <div style="margin-bottom: 8px;"><b>相关链接</b></div>
                        <a href="/tos" style="margin-right: 12px;">服务条款</a>
                        <a href="/privacy">隐私政策</a>
                        <div style="margin-top: 12px; font-size: 12px; color: #888;">
                            <a href="//beian.miit.gov.cn"
                                style="color: #888; text-decoration: none;">蜀ICP备2024087198号-1</a><br /><br />
                            除非另有说明，本网站上的所有内容均为 梦游制作组
                            的财产，并受中华人民共和国及国际版权法的保护。<br />
                            版权所有 &copy; 2023-2026 梦游制作组 Notanote，保留所有权利
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div class="SidebarBackdrop"></div>

    <script src="//static.notanote.cn/js/header.js"></script>
    <script src="//static.notanote.cn/js/sidebar.js"></script>

    <script>
        const ACCELERATE = "https://v6.gh-proxy.org/https://raw.githubusercontent.com/";
        const REPO = "Notanote-Program/Public-wikiDocs";
        const BRANCH = "main";
        const DEFAULT_PAGE = "main";
        const DEFAULT_LOCALE = "zh-CN";

        const params = new URLSearchParams(window.location.search);

        function sanitizePageName(input) {
            const raw = (input || "").trim();
            const safe = raw.replace(/[^a-zA-Z0-9_\-\/\u4e00-\u9fa5\u3000-\u303f\uff00-\uffef\u0021-\u002f]/g, "");
            const normalized = safe
                .replace(/^\/+/, "")
                .split("/")
                .filter((seg) => seg && seg !== "." && seg !== "..")
                .join("/");
            return normalized || DEFAULT_PAGE;
        }

        const page = sanitizePageName(params.get("p"));
        const preLocale = (params.get("l") || "").trim();
        let locale = DEFAULT_LOCALE;

        function jumpToList() {
            window.location.href = `/wikiList?p=${encodeURIComponent(page)}&l=${encodeURIComponent(locale)}`;
        }

        function jump(newPage) {
            const safeNewPage = sanitizePageName(newPage);
            window.location.href = `/wiki?p=${encodeURIComponent(safeNewPage)}&l=${encodeURIComponent(locale)}`;
        }

        async function fetchText(url, { timeoutMs = 15000 } = {}) {
            const controller = new AbortController();
            const t = setTimeout(() => controller.abort(), timeoutMs);

            try {
                const res = await fetch(url, { signal: controller.signal });
                if (!res.ok) {
                    const hint = `${res.status} ${res.statusText}`.trim();
                    throw new Error(`HTTP ${hint} for ${url}`);
                }
                return await res.text();
            } finally {
                clearTimeout(t);
            }
        }

        async function fetchJson(url, opts) {
            const text = await fetchText(url, opts);
            try {
                return JSON.parse(text);
            } catch (e) {
                throw new Error(`Invalid JSON from ${url}`);
            }
        }

        function getFolderJsonPath(mdFilePath) {
            const idx = mdFilePath.lastIndexOf("/");
            if (idx === -1) return "/Folder.json";
            return `/${mdFilePath.slice(0, idx)}/Folder.json`;
        }

        function buildRawUrl(path) {
            const clean = String(path).replace(/^\/+/, "");
            return `${ACCELERATE}${REPO}/refs/heads/${BRANCH}/${clean}`;
        }

        function renderSidebar(folderJson) {
            const container = document.getElementById("sidebar-container");
            if (!container) throw new Error("sidebar-container not found");
            container.innerHTML = "";

            const items = folderJson?.[page] || folderJson?.["Main"];
            if (!Array.isArray(items)) {
                console.error("未找到可用的侧边栏列表。page:", page, "Folder.json keys:", Object.keys(folderJson || {}));
                return;
            }

            for (const item of items) {
                if (item?.Class === "ClassText") {
                    const p = document.createElement("p");
                    p.className = "Sidebar-Title";
                    p.textContent = item.Content ?? "";
                    container.appendChild(p);
                    continue;
                }

                if (item?.Class === "Object") {
                    const a = document.createElement("a");
                    a.className = "Sidebar-Link";
                    a.href = item.Href || "#";
                    a.textContent = item.Content ?? "";

                    if (item.SubObject) {
                        const tag = document.createElement("span");
                        tag.className = item.Class + "-SubTitle";
                        tag.textContent = item.SubObject;
                        a.appendChild(tag);
                    }

                    container.appendChild(a);
                }
            }
        }

        function renderMarkdownFromText(markdownText) {
            const container = document.getElementById("markdown-container");
            if (!container) throw new Error("markdown-container not found");

            if (typeof marked === "undefined") {
                container.textContent = markdownText;
                console.error("marked 未加载");
                return;
            }

            const html = marked.parse(markdownText);

            container.innerHTML = html;

            if (window.location.hash) { window.location.href = window.location.hash; }
            window.history.pushState(null, document.title, window.location.href);
        }

        (async function main() {
            try {
                const localesUrl = buildRawUrl("locales.json");
                const localesJson = await fetchJson(localesUrl);

                if (preLocale && localesJson?.locales && Object.prototype.hasOwnProperty.call(localesJson.locales, preLocale)) {
                    locale = preLocale;
                } else {
                    window.location.href = `/wiki?p=${encodeURIComponent(page)}&l=${encodeURIComponent(DEFAULT_LOCALE)}`;
                    return;
                }

                const mdFilePath = `${page}.md`;
                const folderJsonUrl = buildRawUrl(`${locale}${getFolderJsonPath(mdFilePath)}`);
                const markdownUrl = buildRawUrl(`${locale}/${mdFilePath}`);

                const [folderJson, markdownText] = await Promise.all([fetchJson(folderJsonUrl), fetchText(markdownUrl)]);

                const mappedTitle = folderJson?.[mdFilePath];
                document.title = `${mappedTitle || page} | Notanote 文档`;

                renderSidebar(folderJson);
                renderMarkdownFromText(markdownText);
            } catch (err) {
                console.error("页面加载失败：", err);
                window.location.href = `/wiki?p=404&l=${encodeURIComponent(locale)}`;
            }
        })();

        // Sidebar toggle
        document.querySelector('.SidebarMenuButton').addEventListener('click', () => {
            document.documentElement.classList.toggle('SidebarOpen');
        });
    </script>
</body>

</html>
